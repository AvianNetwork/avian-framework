# docker-compose.yml lives in docker/ — env file is one level up at the repo root.
# Always run with: docker compose --env-file .env -f docker/docker-compose.yml <command>

x-env: &env-file
  env_file:
    - ../.env

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    <<: *env-file
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Applications ─────────────────────────────────────────────────────────────

  api:
    <<: *env-file
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      AVIAN_RPC_URL: http://avian-node:7896
      AVIAN_RPC_USER: ${AVIAN_RPC_USER}
      AVIAN_RPC_PASS: ${AVIAN_RPC_PASS}
      AVIAN_RPC_WALLET: ${AVIAN_RPC_WALLET:-}
      CORS_ORIGIN: ${WEB_URL}
      PORT: 3001
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      avian-node:
        condition: service_healthy

  web:
    <<: *env-file
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* must be passed at build time — Next.js bakes them into the client bundle
        NEXT_PUBLIC_API_URL: ${API_URL}/api/v1
        NEXT_PUBLIC_WS_URL: ${API_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Internal URL for server-side (SSR) API calls within the Docker network
      API_INTERNAL_URL: http://api:3001/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

  indexer:
    <<: *env-file
    build:
      context: ..
      dockerfile: apps/indexer/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AVIAN_RPC_URL: http://avian-node:7896
      AVIAN_RPC_USER: ${AVIAN_RPC_USER}
      AVIAN_RPC_PASS: ${AVIAN_RPC_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      avian-node:
        condition: service_healthy

  # ── Cloudflare Tunnel ─────────────────────────────────────────────────────
  # Create a tunnel at https://one.dash.cloudflare.com and set CLOUDFLARE_TUNNEL_TOKEN
  # Configure ingress rules in the Cloudflare dashboard:
  #   yourdomain.com        → http://web:3000
  #   api.yourdomain.com    → http://api:3001
  cloudflared:
    <<: *env-file
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
      - api

  # ── Avian Core node ───────────────────────────────────────────────────────
  # First run will sync the full chain (~several hours). Data persists in avian_data volume.
  # Build:  docker compose -f docker/docker-compose.yml build avian-node
  avian-node:
    <<: *env-file
    build:
      context: avian-node
      dockerfile: Dockerfile
    restart: unless-stopped
    # aviand needs time to flush indexes (txindex, assetindex, addressindex, etc.)
    # on shutdown. Default 10s is far too short and risks index corruption.
    stop_grace_period: 120s
    volumes:
      - avian_data:/avian/.avian
    healthcheck:
      test: ['CMD-SHELL', 'avian-cli -rpcuser="$$AVIAN_RPC_USER" -rpcpassword="$$AVIAN_RPC_PASS" -rpcconnect=127.0.0.1 getblockcount']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s


volumes:
  postgres_data:
  redis_data:
  avian_data:
  uploads_data:
